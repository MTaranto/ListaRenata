<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Renata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 p-4 min-h-screen flex flex-col items-center py-10">

    <div class="max-w-md w-full bg-gray-800 border border-gray-700 rounded-3xl shadow-xl overflow-hidden p-6 mb-6">
        <h1 class="text-2xl font-bold text-orange-500 mb-4 text-center">Adicionar Presente 🎁</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300">Nome do Presente</label>
                <input type="text" id="nome" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white placeholder-gray-400 shadow-sm border p-2" placeholder="Ex: Jogo de Copos">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300">Link da Shopee</label>
                <input type="url" id="link" class="mt-1 block w-full rounded-md bg-gray-700 border-gray-600 text-white placeholder-gray-400 shadow-sm border p-2" placeholder="https://shopee.com.br/...">
            </div>
            <button onclick="adicionar()" class="w-full bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg font-bold transition transform hover:scale-[1.02]">Salvar Presente</button>
        </div>
        <p id="msg" class="mt-4 text-center text-sm font-medium"></p>
    </div>

    <div class="max-w-md w-full bg-gray-800 border border-gray-700 rounded-3xl shadow-xl overflow-hidden p-6">
        <h2 class="text-xl font-bold text-gray-100 mb-4 text-center">Gerenciar Presentes</h2>
        <div id="lista-admin" class="space-y-3">
            <p class="text-gray-400 text-center text-sm">Carregando lista...</p>
        </div>
    </div>

<script src="config.js"></script>

<script>

const db = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

async function carregarListaAdmin() {
            const { data, error } = await db.from('presentes').select('*').order('nome');
            const listaDiv = document.getElementById('lista-admin');

            if (error) {
                listaDiv.innerHTML = '<p class="text-red-500 text-sm text-center">Erro ao carregar o banco.</p>';
                return;
            }

            if (data.length === 0) {
                listaDiv.innerHTML = '<p class="text-gray-400 text-sm text-center">Nenhum presente cadastrado ainda.</p>';
                return;
            }

            listaDiv.innerHTML = '';
            data.forEach(item => {

                let statusAcaoHTML = '';
                let estiloTexto = 'text-gray-200';

                if (item.comprado) {
                    // Visual para quando já foi comprado
                    estiloTexto = 'text-gray-500 line-through';
                    statusAcaoHTML = `
                        <div class="flex flex-col items-end justify-center">
                            <span class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Presenteado por</span>
                            <span class="bg-green-500/20 border border-green-500/30 text-green-400 px-3 py-1 rounded-full text-xs font-bold shadow-sm whitespace-nowrap">
                                ${item.comprador}
                            </span>
                        </div>
                    `;
                } else {
                    // Botão de excluir
                    statusAcaoHTML = `
                        <button onclick="excluir('${item.id}')" class="bg-red-900/80 hover:bg-red-800 text-red-200 text-xs px-4 py-2 rounded-xl transition border border-red-800 shadow-sm font-semibold">
                            Excluir
                        </button>
                    `;
                }

                listaDiv.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-700/50 p-4 rounded-2xl border border-gray-600 gap-4 shadow-sm hover:border-gray-500 transition-colors">
                        <span class="text-sm font-medium flex-1 ${estiloTexto} leading-tight">${item.nome}</span>
                        <div class="flex-shrink-0">
                            ${statusAcaoHTML}
                        </div>
                    </div>
                `;
            });
        }
        async function adicionar() {
            const nome = document.getElementById('nome').value;
            const link = document.getElementById('link').value;
            const msg = document.getElementById('msg');

            if (!nome || !link) {
                msg.innerText = 'Preencha os dois campos!';
                msg.className = 'mt-4 text-center text-sm font-medium text-red-500';
                return;
            }

            msg.innerText = 'Salvando...';
            msg.className = 'mt-4 text-center text-sm font-medium text-blue-400';

            const { error } = await db.from('presentes').insert([{ nome: nome, link: link }]);

            if (error) {
                msg.innerText = 'Erro ao salvar! Veja o console.';
                msg.className = 'mt-4 text-center text-sm font-medium text-red-500';
                console.error(error);
            } else {
                msg.innerText = 'Adicionado com sucesso!';
                msg.className = 'mt-4 text-center text-sm font-medium text-green-400';
                document.getElementById('nome').value = '';
                document.getElementById('link').value = '';

                carregarListaAdmin();
            }
        }

        async function excluir(id) {
            if(confirm('Tem certeza que deseja apagar esse presente da lista?')) {
                await db.from('presentes').delete().eq('id', id);
                carregarListaAdmin();
            }
        }

        carregarListaAdmin();
    </script>
    <script src="config.js"></script>
</body>
</html>
